title: Suspicious Encoded PowerShell
id: 1d8c0e68-4c61-4f52-b546-8c5694e019e3
status: experimental
description: Detects PowerShell launched with common encoded-command switches in authorised lab telemetry.
author: Upenyu Hlangabeza
date: 2026-07-18
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\\powershell.exe'
      - '\\pwsh.exe'
  selection_cli:
    CommandLine|contains:
      - ' -enc '
      - ' -encodedcommand '
      - 'FromBase64String'
  condition: all of selection_*
falsepositives:
  - Administrative automation using encoded commands
level: high
tags:
  - attack.execution
  - attack.t1059.001
