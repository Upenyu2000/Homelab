name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall app.py src
      - name: Initialise database and run audits
        run: |
          python - <<'PY'
          from src.database import initialise
          from src.seed import seed_demo
          from src.services import run_identity_audit, incident_report, vendor_report, identity_report
          initialise(); seed_demo(); run_identity_audit()
          assert 'CASE-001' in incident_report('CASE-001')
          assert 'NimbusHR' in vendor_report('VEN-001')
          assert 'Identity Lifecycle Audit' in identity_report()
          print('Validation successful')
          PY
      - name: Build container
        run: docker build -t sentinelforge:test .
